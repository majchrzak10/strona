# =============================================================================
# CyberFolks: build → rsync ./out/ przez SSH (port 222) — bez bugów sftp „put”.
#
# --- Wymagane sekrety (Settings → Secrets and variables → Actions) ---
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD — połączenie SSH/SFTP
#   WEB3FORMS_ACCESS_KEY — formularz kontaktowy (ta sama wartość co w Web3Forms;
#     trafia do NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY przy buildzie)
#
# --- Asari (oferty + zdjęcia) — opcjonalne ---
#   • Domyślnie: folder asari-export/ w repozytorium (XML + foto/ w commicie).
#   • Auto-pobieranie z FTP (zalecane przy Asari eksportującym XML na serwer):
#       ASARI_FTP_SERVER / ASARI_FTP_USERNAME / ASARI_FTP_PASSWORD
#       ASARI_FTP_PORT (domyślnie 21)
#       ASARI_REMOTE_XML_DIR  (domyślnie /public_html/asari2)
#       ASARI_REMOTE_FOTO_DIR (domyślnie /public_html/asari2/foto)
#   • Auto-pobieranie ZIP (zalecane do pełnej automatyzacji):
#       ASARI_EXPORT_URL      — URL do paczki ZIP z eksportem Asari
#       ASARI_EXPORT_USERNAME — opcjonalnie (basic auth)
#       ASARI_EXPORT_PASSWORD — opcjonalnie (basic auth)
#       ASARI_EXPORT_BEARER   — opcjonalnie (token bearer; alternatywa do basic auth)
#   • Sekrety lub zmienne ASARI_DATA_DIR / ASARI_PHOTOS_DIR — gdy eksport jest poza repo
#     albo chcesz nadpisać domyśl (vars.* wystarczy dla zwykłych ścieżek względnych).
#   • Jeśli sekret jest pusty lub wskazuje nieistniejący katalog → używane jest
#     $GITHUB_WORKSPACE/asari-export oraz …/foto.
#   NEXT_PUBLIC_SITE_URL — opcjonalnie: np. https://bioredlab.pl (test); puste = https://dan-dom.pl
#
# --- Zmienne (Variables) ---
#   FTP_SERVER_DIR — jak w FileZilli (np. domains/domena.pl/public_html), nie „/public_html/” zgadywane
#   SFTP_PORT (domyślnie 222) | DEPLOY_METHOD=lftp — FTP/FTPS | SFTP_USE_KEY_AUTH + SSH_PRIVATE_KEY
# =============================================================================

name: Deploy — CyberFolks (SFTP)

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Co 2h: automatyczna aktualizacja ofert po stronie CI.
    - cron: "15 */2 * * *"
  workflow_dispatch:
    inputs:
      sftp_port:
        description: "Port SSH (CyberFolks: 222). Puste = zmienna SFTP_PORT lub 222."
        required: false
        type: string

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: false

permissions:
  contents: read

env:
  SSH_PORT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sftp_port != '' && github.event.inputs.sftp_port || (vars.SFTP_PORT != '' && vars.SFTP_PORT || '222') }}
  REMOTE_PATH: ${{ vars.FTP_SERVER_DIR || 'public_html' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt-in: JS actions (checkout, setup-node, …) run on Node 24 before the June 2026 default.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Pobranie eksportu Asari (SSH/rsync, opcjonalnie)
        env:
          ASARI_SSH_HOST: ${{ secrets.ASARI_FTP_SERVER || vars.ASARI_FTP_SERVER || secrets.FTP_SERVER }}
          ASARI_SSH_USER: ${{ secrets.ASARI_FTP_USERNAME || vars.ASARI_FTP_USERNAME || secrets.FTP_USERNAME }}
          ASARI_SSH_PASS: ${{ secrets.ASARI_FTP_PASSWORD || vars.ASARI_FTP_PASSWORD || secrets.FTP_PASSWORD }}
          ASARI_SSH_PORT: ${{ secrets.ASARI_SSH_PORT || vars.ASARI_SSH_PORT || vars.SFTP_PORT || '222' }}
          ASARI_REMOTE_XML_DIR: ${{ vars.ASARI_REMOTE_XML_DIR || 'public_html/asari2' }}
          ASARI_REMOTE_FOTO_DIR: ${{ vars.ASARI_REMOTE_FOTO_DIR || 'public_html/asari2/foto' }}
        run: |
          set -euo pipefail
          if [ -z "${ASARI_SSH_HOST:-}" ] || [ -z "${ASARI_SSH_USER:-}" ] || [ -z "${ASARI_SSH_PASS:-}" ]; then
            echo "Brak danych SSH Asari — pomijam pobieranie Asari z serwera."
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync sshpass openssh-client

          TARGET="$GITHUB_WORKSPACE/asari-export"
          rm -rf "$TARGET"
          mkdir -p "$TARGET" "$TARGET/foto"

          XML_DIR="${ASARI_REMOTE_XML_DIR#/}"
          FOTO_DIR="${ASARI_REMOTE_FOTO_DIR#/}"
          SSH_CMD="ssh -l '${ASARI_SSH_USER}' -p ${ASARI_SSH_PORT} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"

          echo "Pobieram XML z: ${XML_DIR} (SSH port ${ASARI_SSH_PORT})"
          SSHPASS="${ASARI_SSH_PASS}" sshpass -e rsync -avz --delete \
            -e "${SSH_CMD}" \
            "${ASARI_SSH_HOST}:${XML_DIR%/}/" "${TARGET}/"

          if [ -n "${FOTO_DIR:-}" ]; then
            echo "Pobieram FOTO z: ${FOTO_DIR} (SSH port ${ASARI_SSH_PORT})"
            SSHPASS="${ASARI_SSH_PASS}" sshpass -e rsync -avz --delete \
              -e "${SSH_CMD}" \
              "${ASARI_SSH_HOST}:${FOTO_DIR%/}/" "${TARGET}/foto/"
          fi

          echo "Pobrano asari-export przez SSH/rsync."

      - name: Pobranie eksportu Asari (ZIP, opcjonalnie)
        env:
          ASARI_EXPORT_URL: ${{ secrets.ASARI_EXPORT_URL || vars.ASARI_EXPORT_URL }}
          ASARI_EXPORT_USERNAME: ${{ secrets.ASARI_EXPORT_USERNAME || vars.ASARI_EXPORT_USERNAME }}
          ASARI_EXPORT_PASSWORD: ${{ secrets.ASARI_EXPORT_PASSWORD || vars.ASARI_EXPORT_PASSWORD }}
          ASARI_EXPORT_BEARER: ${{ secrets.ASARI_EXPORT_BEARER || vars.ASARI_EXPORT_BEARER }}
        run: |
          set -euo pipefail
          if [ -z "${ASARI_EXPORT_URL:-}" ]; then
            echo "ASARI_EXPORT_URL nie ustawiono — używam asari-export/ z repo."
            exit 0
          fi

          echo "Pobieram eksport Asari ZIP z URL (sekret)."
          mkdir -p "$GITHUB_WORKSPACE/asari-export"
          rm -rf "$GITHUB_WORKSPACE/asari-export"/*
          TMP_ZIP="$RUNNER_TEMP/asari-export.zip"
          TMP_UNPACK="$RUNNER_TEMP/asari-unpack"
          rm -rf "$TMP_UNPACK"
          mkdir -p "$TMP_UNPACK"

          AUTH_ARGS=()
          if [ -n "${ASARI_EXPORT_BEARER:-}" ]; then
            AUTH_ARGS+=(-H "Authorization: Bearer ${ASARI_EXPORT_BEARER}")
          elif [ -n "${ASARI_EXPORT_USERNAME:-}" ] || [ -n "${ASARI_EXPORT_PASSWORD:-}" ]; then
            AUTH_ARGS+=(-u "${ASARI_EXPORT_USERNAME:-}:${ASARI_EXPORT_PASSWORD:-}")
          fi

          curl -fsSL "${AUTH_ARGS[@]}" "$ASARI_EXPORT_URL" -o "$TMP_ZIP"
          unzip -q -o "$TMP_ZIP" -d "$TMP_UNPACK"

          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          unpack = Path(os.environ["TMP_UNPACK"])
          target = Path(os.environ["GITHUB_WORKSPACE"]) / "asari-export"

          def has_offer_files(d: Path) -> bool:
              return any(p.name.lower().endswith("_001.xml") for p in d.glob("*.xml"))

          candidates = [unpack] + [p for p in unpack.rglob("*") if p.is_dir()]
          source = next((d for d in candidates if has_offer_files(d)), None)
          if source is None:
              raise SystemExit("Nie znaleziono plików *_001.xml w paczce ZIP Asari.")

          for item in source.iterdir():
              dest = target / item.name
              if dest.exists():
                  if dest.is_dir():
                      shutil.rmtree(dest)
                  else:
                      dest.unlink()
              if item.is_dir():
                  shutil.copytree(item, dest)
              else:
                  shutil.copy2(item, dest)

          print(f"Asari source in ZIP: {source}")
          print(f"Prepared target: {target}")
          PY

          echo "Pobrano i przygotowano asari-export/ do buildu."

      - name: Build statyczny (out/)
        env:
          ASARI_DATA_DIR: ${{ secrets.ASARI_DATA_DIR || vars.ASARI_DATA_DIR }}
          ASARI_PHOTOS_DIR: ${{ secrets.ASARI_PHOTOS_DIR || vars.ASARI_PHOTOS_DIR }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          set -euo pipefail
          DEFAULT_ASARI="$GITHUB_WORKSPACE/asari-export"
          if [ -z "${ASARI_DATA_DIR:-}" ] || [ ! -d "$ASARI_DATA_DIR" ]; then
            export ASARI_DATA_DIR="$DEFAULT_ASARI"
          fi
          if [ -z "${ASARI_PHOTOS_DIR:-}" ] || [ ! -d "$ASARI_PHOTOS_DIR" ]; then
            export ASARI_PHOTOS_DIR="$ASARI_DATA_DIR/foto"
          fi
          echo "Build: ASARI_DATA_DIR=$ASARI_DATA_DIR (XML)"
          echo "Build: ASARI_PHOTOS_DIR=$ASARI_PHOTOS_DIR (zdjęcia → public/zdjecia)"
          if [ ! -d "$ASARI_DATA_DIR" ]; then
            echo "::warning::Brak folderu Asari — oferty będą puste. Dodaj commit asari-export/ lub ustaw sekret ASARI_DATA_DIR."
          fi
          echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-<puste → domyślnie dan-dom.pl w kodzie>}"
          npm run build

      - name: Wgranie na serwer (rsync + SSH, hasło)
        if: ${{ vars.DEPLOY_METHOD != 'lftp' && vars.SFTP_USE_KEY_AUTH != 'true' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync sshpass openssh-client
          REMOTE="${REMOTE_PATH%/}"
          echo "rsync → ${SSH_USER}@${SSH_HOST}:${REMOTE}/ (port ${SSH_PORT})"
          sshpass -e rsync -avz --delete \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60" \
            ./out/ "${SSH_USER}@${SSH_HOST}:${REMOTE}/"

      - name: Wgranie na serwer (rsync + SSH, klucz)
        if: ${{ vars.DEPLOY_METHOD != 'lftp' && vars.SFTP_USE_KEY_AUTH == 'true' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync openssh-client
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          REMOTE="${REMOTE_PATH%/}"
          rsync -avz --delete \
            -e "ssh -p ${SSH_PORT} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60" \
            ./out/ "${SSH_USER}@${SSH_HOST}:${REMOTE}/"
          rm -f ~/.ssh/deploy_key

      - name: Wgranie na CyberFolks (FTP/FTPS — gdy SFTP niemożliwy)
        if: ${{ vars.DEPLOY_METHOD == 'lftp' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT != '' && fromJSON(vars.FTP_PORT) || 21 }}
          timeout: 120000
          security: loose
