# =============================================================================
# GitHub → CyberFolks: wgrywanie folderu out/ przez SFTP (SSH), nie FTP.
# Wiele hostingów (w tym CyberFolks) odrzuca FTP z IP GitHuba — SFTP działa stabilniej.
#
# Sekrety (te same nazwy co wcześniej — możesz użyć loginu/hasła z panelu „FTP/SFTP”):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Opcja: zmienna FTP_SERVER_DIR (np. /domains/domena.pl/public_html/)
# Opcja: zmienna SFTP_PORT (domyślnie 22)
# Opcja: sekrety ASARI_* — pełny build ofert w CI
# =============================================================================

name: Deploy — CyberFolks (SFTP)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Build statyczny (out/)
        env:
          ASARI_DATA_DIR: ${{ secrets.ASARI_DATA_DIR }}
          ASARI_PHOTOS_DIR: ${{ secrets.ASARI_PHOTOS_DIR }}
        run: npm run build

      # SFTP (hasło) — to samo konto co w FileZilli w trybie SFTP (port 22)
      - name: Wgranie na CyberFolks (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ vars.SFTP_PORT != '' && fromJSON(vars.SFTP_PORT) || 22 }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "./out/*"
          remote_path: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          sftp_only: true
          sftpArgs: "-o StrictHostKeyChecking=accept-new -o ConnectTimeout=60"
