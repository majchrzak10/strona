# =============================================================================
# CyberFolks: build → wgrywanie out/
#
# Domyślnie: SFTP (SSH). Sekrety: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
#
# Port SFTP: CyberFolks podaje zwykle 222 (nie 22). Zmienna SFTP_PORT albo pole w Run workflow.
#            Domyślnie w workflow: 222 — inny hosting: ustaw SFTP_PORT (np. 22).
#
# Gdy SFTP w ogóle niedostępny: zmienna DEPLOY_METHOD = lftp (FTP/FTPS na porcie 21)
# Opcja: FTP_PROTOCOL (ftps / ftps-legacy) przy lftp
# Katalog: FTP_SERVER_DIR
# =============================================================================

name: Deploy — CyberFolks (SFTP)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      sftp_port:
        description: "Port SFTP (CyberFolks: 222). Puste = zmienna SFTP_PORT lub 222."
        required: false
        type: string

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Build statyczny (out/)
        env:
          ASARI_DATA_DIR: ${{ secrets.ASARI_DATA_DIR }}
          ASARI_PHOTOS_DIR: ${{ secrets.ASARI_PHOTOS_DIR }}
        run: npm run build

      - name: Wgranie na CyberFolks (SFTP)
        if: ${{ vars.DEPLOY_METHOD != 'lftp' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sftp_port != '' && fromJSON(github.event.inputs.sftp_port) || (vars.SFTP_PORT != '' && fromJSON(vars.SFTP_PORT) || 222) }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "./out/*"
          remote_path: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          sftp_only: true
          sftpArgs: "-o StrictHostKeyChecking=accept-new -o ConnectTimeout=60"

      - name: Wgranie na CyberFolks (FTP/FTPS — gdy SFTP niemożliwy)
        if: ${{ vars.DEPLOY_METHOD == 'lftp' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT != '' && fromJSON(vars.FTP_PORT) || 21 }}
          timeout: 120000
          security: loose
