# =============================================================================
# CyberFolks: build → rsync ./out/ przez SSH (port 222) — bez bugów sftp „put”.
#
# --- Wymagane sekrety (Settings → Secrets and variables → Actions) ---
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD — połączenie SSH/SFTP
#   WEB3FORMS_ACCESS_KEY — formularz kontaktowy (ta sama wartość co w Web3Forms;
#     trafia do NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY przy buildzie)
#
# --- Asari (oferty + zdjęcia) — opcjonalne ---
#   • Domyślnie: folder asari-export/ w repozytorium (XML + foto/ w commicie).
#   • Auto-pobieranie z serwera po SSH/rsync:
#       używa tych samych sekretów co deploy: FTP_SERVER / FTP_USERNAME / FTP_PASSWORD
#       ASARI_SSH_PORT (domyślnie 222)
#       ASARI_REMOTE_XML_DIR  (domyślnie public_html/asari2)
#       ASARI_REMOTE_FOTO_DIR (domyślnie public_html/asari2/foto)
#   • Sekrety lub zmienne ASARI_DATA_DIR / ASARI_PHOTOS_DIR — gdy eksport jest poza repo
#     albo chcesz nadpisać domyśl (vars.* wystarczy dla zwykłych ścieżek względnych).
#   • Jeśli sekret jest pusty lub wskazuje nieistniejący katalog → używane jest
#     $GITHUB_WORKSPACE/asari-export oraz …/foto.
#   NEXT_PUBLIC_SITE_URL — opcjonalnie: np. https://bioredlab.pl (test); puste = https://dan-dom.pl
#
# --- Zmienne (Variables) ---
#   FTP_SERVER_DIR — jak w FileZilli (np. domains/domena.pl/public_html), nie „/public_html/” zgadywane
#   SFTP_PORT (domyślnie 222) | DEPLOY_METHOD=lftp — FTP/FTPS | SFTP_USE_KEY_AUTH + SSH_PRIVATE_KEY
# =============================================================================

name: Deploy — CyberFolks (SFTP)

on:
  push:
    branches:
      - main
      - master
  schedule:
    # Co 2h: automatyczna aktualizacja ofert po stronie CI.
    - cron: "15 */2 * * *"
  workflow_dispatch:
    inputs:
      sftp_port:
        description: "Port SSH (CyberFolks: 222). Puste = zmienna SFTP_PORT lub 222."
        required: false
        type: string

concurrency:
  group: deploy-cyberfolks
  cancel-in-progress: false

permissions:
  contents: read

env:
  SSH_PORT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sftp_port != '' && github.event.inputs.sftp_port || (vars.SFTP_PORT != '' && vars.SFTP_PORT || '222') }}
  REMOTE_PATH: ${{ vars.FTP_SERVER_DIR || 'public_html' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt-in: JS actions (checkout, setup-node, …) run on Node 24 before the June 2026 default.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Pobranie eksportu Asari (SSH/rsync, opcjonalnie)
        env:
          ASARI_SSH_HOST: ${{ secrets.FTP_SERVER }}
          ASARI_SSH_USER: ${{ secrets.FTP_USERNAME }}
          ASARI_SSH_PASS: ${{ secrets.FTP_PASSWORD }}
          ASARI_SSH_PORT: ${{ secrets.ASARI_SSH_PORT || vars.ASARI_SSH_PORT || vars.SFTP_PORT || '222' }}
          ASARI_REMOTE_XML_DIR: ${{ vars.ASARI_REMOTE_XML_DIR || 'public_html/asari2' }}
          ASARI_REMOTE_FOTO_DIR: ${{ vars.ASARI_REMOTE_FOTO_DIR || 'public_html/asari2/foto' }}
        run: |
          set -euo pipefail
          if [ -z "${ASARI_SSH_HOST:-}" ] || [ -z "${ASARI_SSH_USER:-}" ] || [ -z "${ASARI_SSH_PASS:-}" ]; then
            echo "Brak danych SSH Asari — pomijam pobieranie Asari z serwera."
            exit 0
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync sshpass openssh-client

          TARGET="$GITHUB_WORKSPACE/asari-export"
          STAGING="$RUNNER_TEMP/asari-export-fetch"
          rm -rf "$STAGING"
          mkdir -p "$STAGING" "$STAGING/foto"
          mkdir -p "$TARGET" "$TARGET/foto"

          XML_DIR="$(printf '%s' "${ASARI_REMOTE_XML_DIR}" | tr -d '\r\n' | sed 's#^/##')"
          FOTO_DIR="$(printf '%s' "${ASARI_REMOTE_FOTO_DIR}" | tr -d '\r\n' | sed 's#^/##')"
          ASARI_SSH_HOST_CLEAN="$(printf '%s' "${ASARI_SSH_HOST}" | tr -d '\r\n')"
          ASARI_SSH_USER_CLEAN="$(printf '%s' "${ASARI_SSH_USER}" | tr -d '\r\n')"
          ASARI_SSH_PASS_CLEAN="$(printf '%s' "${ASARI_SSH_PASS}" | tr -d '\r\n')"
          ASARI_SSH_PORT_CLEAN="$(printf '%s' "${ASARI_SSH_PORT}" | tr -d '\r\n')"
          SSH_CMD="ssh -l '${ASARI_SSH_USER_CLEAN}' -p ${ASARI_SSH_PORT_CLEAN} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"

          fetch_xml_ssh() {
            echo "Pobieram XML z: ${XML_DIR} (SSH port ${ASARI_SSH_PORT})"
            SSHPASS="${ASARI_SSH_PASS_CLEAN}" sshpass -e rsync -avz --delete \
              -e "${SSH_CMD}" \
              "${ASARI_SSH_HOST_CLEAN}:${XML_DIR%/}/" "${STAGING}/"
          }

          fetch_foto_ssh() {
            echo "Pobieram FOTO z: ${FOTO_DIR} (SSH port ${ASARI_SSH_PORT})"
            SSHPASS="${ASARI_SSH_PASS_CLEAN}" sshpass -e rsync -avz --delete \
              -e "${SSH_CMD}" \
              "${ASARI_SSH_HOST_CLEAN}:${FOTO_DIR%/}/" "${STAGING}/foto/"
          }

          count_offers_in_dir() {
            local dir="$1" total=0 n=0
            for f in "${dir}"/*.xml; do
              [ -f "$f" ] || continue
              case "$(basename "$f" | tr "[:upper:]" "[:lower:]")" in
                definictions*|definitions*) continue ;;
              esac
              n=$(grep -o "<offer>" "$f" 2>/dev/null | wc -l) || n=0
              total=$((total + n))
            done
            echo "$total"
          }

          xml_ok="false"
          foto_ok="true"

          if fetch_xml_ssh; then
            xml_ok="true"
          else
            echo "::warning::SSH/rsync Asari nie powiódł się. Używam asari-export/ z repo."
          fi

          if [ "${xml_ok}" = "true" ] && [ -n "${FOTO_DIR:-}" ]; then
            if ! fetch_foto_ssh; then
              foto_ok="false"
            fi
          fi

          if [ "${xml_ok}" = "true" ]; then
            PREV_COUNT="$(count_offers_in_dir "$TARGET")"
            NEW_COUNT="$(count_offers_in_dir "$STAGING")"
            echo "Asari sanity-check: poprzednio=${PREV_COUNT}, nowy eksport=${NEW_COUNT}"

            if [ "${NEW_COUNT}" -eq 0 ]; then
              echo "::warning::Nowy eksport Asari ma 0 ofert — pomijam podmianę (zostaje poprzedni stan)."
              xml_ok="false"
            elif [ "${PREV_COUNT}" -gt 0 ]; then
              MIN_ALLOWED=$(( (PREV_COUNT * 70 + 99) / 100 ))
              if [ "${NEW_COUNT}" -lt "${MIN_ALLOWED}" ]; then
                echo "::warning::Nowy eksport Asari wygląda na niepełny (${NEW_COUNT} < 70% z ${PREV_COUNT}) — pomijam podmianę."
                xml_ok="false"
              fi
            fi
          fi

          if [ "${xml_ok}" = "true" ]; then
            rm -rf "$TARGET"
            mkdir -p "$TARGET"
            rsync -a --delete "${STAGING}/" "${TARGET}/"
            echo "Pobrano asari-export (SSH) i zaakceptowano sanity-check."
            if [ "${foto_ok}" != "true" ]; then
              echo "::warning::XML pobrany, ale zdjęcia nie zostały odświeżone (zostaną poprzednie)."
            fi
          else
            echo "::warning::Nie udało się pobrać Asari z serwera po SSH. Używam asari-export/ z repo."
          fi

      - name: Build statyczny (out/)
        env:
          ASARI_DATA_DIR: ${{ secrets.ASARI_DATA_DIR || vars.ASARI_DATA_DIR }}
          ASARI_PHOTOS_DIR: ${{ secrets.ASARI_PHOTOS_DIR || vars.ASARI_PHOTOS_DIR }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID || 'G-FN97HMK379' }}
        run: |
          set -euo pipefail
          DEFAULT_ASARI="$GITHUB_WORKSPACE/asari-export"
          if [ -z "${ASARI_DATA_DIR:-}" ] || [ ! -d "$ASARI_DATA_DIR" ]; then
            export ASARI_DATA_DIR="$DEFAULT_ASARI"
          fi
          if [ -z "${ASARI_PHOTOS_DIR:-}" ] || [ ! -d "$ASARI_PHOTOS_DIR" ]; then
            export ASARI_PHOTOS_DIR="$ASARI_DATA_DIR/foto"
          fi
          echo "Build: ASARI_DATA_DIR=$ASARI_DATA_DIR (XML)"
          echo "Build: ASARI_PHOTOS_DIR=$ASARI_PHOTOS_DIR (zdjęcia → public/zdjecia)"
          if [ ! -d "$ASARI_DATA_DIR" ]; then
            echo "::warning::Brak folderu Asari — oferty będą puste. Dodaj commit asari-export/ lub ustaw sekret ASARI_DATA_DIR."
          fi
          echo "NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-<puste → domyślnie dan-dom.pl w kodzie>}"
          npm run build

      - name: Wgranie na serwer (rsync + SSH, hasło)
        if: ${{ vars.DEPLOY_METHOD != 'lftp' && vars.SFTP_USE_KEY_AUTH != 'true' }}
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync sshpass openssh-client
          SSH_HOST_CLEAN="$(printf '%s' "${SSH_HOST}" | tr -d '\r\n')"
          SSH_USER_CLEAN="$(printf '%s' "${SSH_USER}" | tr -d '\r\n')"
          SSH_PORT_CLEAN="$(printf '%s' "${SSH_PORT}" | tr -d '\r\n')"
          SSHPASS_CLEAN="$(printf '%s' "${SSHPASS}" | tr -d '\r\n')"
          REMOTE="${REMOTE_PATH%/}"
          echo "rsync → ${SSH_USER_CLEAN}@${SSH_HOST_CLEAN}:${REMOTE}/ (port ${SSH_PORT_CLEAN})"
          SSHPASS="${SSHPASS_CLEAN}" sshpass -e rsync -avz --delete \
            -e "ssh -l '${SSH_USER_CLEAN}' -p ${SSH_PORT_CLEAN} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60" \
            ./out/ "${SSH_HOST_CLEAN}:${REMOTE}/"

      - name: Wgranie na serwer (rsync + SSH, klucz)
        if: ${{ vars.DEPLOY_METHOD != 'lftp' && vars.SFTP_USE_KEY_AUTH == 'true' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync openssh-client
          SSH_HOST_CLEAN="$(printf '%s' "${SSH_HOST}" | tr -d '\r\n')"
          SSH_USER_CLEAN="$(printf '%s' "${SSH_USER}" | tr -d '\r\n')"
          SSH_PORT_CLEAN="$(printf '%s' "${SSH_PORT}" | tr -d '\r\n')"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          REMOTE="${REMOTE_PATH%/}"
          rsync -avz --delete \
            -e "ssh -l '${SSH_USER_CLEAN}' -p ${SSH_PORT_CLEAN} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=60" \
            ./out/ "${SSH_HOST_CLEAN}:${REMOTE}/"
          rm -f ~/.ssh/deploy_key

      - name: Wgranie na CyberFolks (FTP/FTPS — gdy SFTP niemożliwy)
        if: ${{ vars.DEPLOY_METHOD == 'lftp' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT != '' && fromJSON(vars.FTP_PORT) || 21 }}
          timeout: 120000
          security: loose
