# =============================================================================
# FB Post — wybór oferty Asari i wysyłka draftu do Make.com (Telegram → Facebook)
#
# Wymagane sekrety (Settings → Secrets and variables → Actions):
#   MAKE_WEBHOOK_URL  — URL webhooka Make.com (scenariusz Webhook → Telegram → FB)
#
# Opcjonalne zmienne (Settings → Variables):
#   SITE_URL          — domyślnie https://dan-dom.pl
#
# Plik stanu: automation/fb-post/state.json (commitowany automatycznie po wysyłce)
# Skrypt:     automation/fb-post/pick-offer.mjs
# =============================================================================

name: FB Post — wybór oferty

on:
  schedule:
    - cron: "0 9 */2 * *"   # co 2 dni o 9:00 UTC (11:00 czasu polskiego latem)
  workflow_dispatch:         # możliwość ręcznego uruchomienia

concurrency:
  group: fb-post
  cancel-in-progress: false  # nie przerywaj trwającego wysyłania

permissions:
  contents: write            # potrzebne do commitu state.json

jobs:
  pick-and-send:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Pobieranie kodu
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalacja zależności
        run: npm ci

      - name: Wybierz treść i wyślij do Make
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASARI_DATA_DIR: ${{ github.workspace }}/asari-export
          SITE_URL: ${{ vars.SITE_URL || 'https://dan-dom.pl' }}
        run: node automation/fb-post/pick-content.mjs

      - name: Zapisz stan do repozytorium (GitHub API)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          node -e "
            const https = require('https');
            const fs = require('fs');
            const local = JSON.parse(fs.readFileSync('automation/fb-post/state.json', 'utf8'));
            const token = process.env.GH_TOKEN;
            const repo = process.env.REPO;

            function req(method, path, body) {
              return new Promise((resolve, reject) => {
                const data = body ? JSON.stringify(body) : null;
                const r = https.request({
                  hostname: 'api.github.com', path, method,
                  headers: {
                    'Authorization': 'Bearer ' + token,
                    'Accept': 'application/vnd.github+json',
                    'User-Agent': 'github-actions',
                    'Content-Type': 'application/json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {})
                  }
                }, res => {
                  let b = '';
                  res.on('data', c => b += c);
                  res.on('end', () => resolve({ status: res.statusCode, body: JSON.parse(b) }));
                });
                r.on('error', reject);
                if (data) r.write(data);
                r.end();
              });
            }

            async function main() {
              const filePath = '/repos/' + repo + '/contents/automation/fb-post/state.json';
              const { status, body } = await req('GET', filePath);
              let remote = { entries: [] };
              let sha = null;
              if (status === 200) {
                remote = JSON.parse(Buffer.from(body.content, 'base64').toString('utf8'));
                sha = body.sha;
              }
              const seen = new Set(remote.entries.map(e => e.signature + '|' + e.status));
              let changed = false;
              for (const e of local.entries) {
                if (!seen.has(e.signature + '|' + e.status)) {
                  remote.entries.push(e);
                  changed = true;
                }
              }
              if (!changed) { console.log('[fb-state] Brak nowych wpisów.'); return; }
              const newContent = JSON.stringify(remote, null, 2) + '\n';
              const putBody = {
                message: 'chore(fb): draft_sent ' + new Date().toISOString().slice(0,10) + ' [skip ci]',
                content: Buffer.from(newContent).toString('base64'),
                ...(sha ? { sha } : {})
              };
              const { status: s } = await req('PUT', filePath, putBody);
              if (s === 200 || s === 201) {
                console.log('[fb-state] Zapisano state.json.');
              } else {
                console.error('[fb-state] Błąd zapisu:', s);
                process.exit(1);
              }
            }
            main().catch(e => { console.error(e); process.exit(1); });
          "
